# Carga inicial del histórico BYMA (~90 días). Disparar manualmente UNA vez (15–25 min).
name: Bootstrap histórico precios

on:
  workflow_dispatch:
    inputs:
      dias:
        description: "Días de historia a cargar por instrumento"
        required: false
        default: "90"
        type: string

concurrency:
  group: cotizaciones-bootstrap-historico
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  checks: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Sincronizar con main
        run: git pull --rebase origin main

      - name: Bootstrap histórico BYMA
        run: python scripts/bootstrap_historico.py --dias "${{ inputs.dias }}"

      - name: Configurar Node.js (tests pre-merge)
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Commit y publicar vía PR si hubo cambios
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          DATA_FILES=(
            docs/data/historico_precios.json
            docs/data/mep_historico.json
          )

          if git diff --quiet HEAD -- "${DATA_FILES[@]}"; then
            echo "Sin cambios en datos del bootstrap"
            exit 0
          fi

          BRANCH="bot/bootstrap-historico-$(date -u +%Y%m%dT%H%M%SZ)"
          git checkout -b "$BRANCH"
          git add "${DATA_FILES[@]}"
          git commit -m "Bootstrap histórico precios BYMA [skip ci]"
          HEAD_SHA="$(git rev-parse HEAD)"
          git push -u origin "$BRANCH"

          if node scripts/run_tests.mjs; then
            TEST_CONCLUSION=success
          else
            TEST_CONCLUSION=failure
          fi
          gh api repos/${{ github.repository }}/check-runs \
            -f name=test \
            -f head_sha="$HEAD_SHA" \
            -f status=completed \
            -f conclusion="$TEST_CONCLUSION"
          if [ "$TEST_CONCLUSION" != success ]; then
            echo "Tests fallaron; abortando publicación."
            exit 1
          fi

          PR_URL="$(gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "Bootstrap histórico precios BYMA" \
            --body "Carga histórica automática (workflow bootstrap).")"
          echo "PR creado: $PR_URL"

          PR_NUMBER="$(gh pr view "$PR_URL" --json number --jq .number)"
          sleep 10
          gh pr merge "$PR_NUMBER" --merge --delete-branch
          echo "Datos publicados en main vía PR #${PR_NUMBER}."
