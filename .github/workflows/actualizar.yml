# Actualiza cotizaciones periódicamente y commitea el JSON para GitHub Pages.
name: Actualizar cotizaciones

on:
  # Lun–vie, ventana UTC ~13:30–21:00 (cubre 11:00–17:30 ART + margen). El job filtra horario exacto.
  schedule:
    - cron: "30 13 * * 1-5"
    - cron: "0,30 14-20 * * 1-5"
    - cron: "0 21 * * 1-5"
  workflow_dispatch:

# Evita push concurrente: un run en curso encola el siguiente (no lo cancela).
concurrency:
  group: cotizaciones-actualizar
  cancel-in-progress: false

# Push vía PR: main exige check "test"; el bot no puede pushear directo con GITHUB_TOKEN.
permissions:
  contents: write
  pull-requests: write
  checks: write

jobs:
  actualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Verificar horario de mercado (ART, lun–vie 11:00–17:30)
        id: mercado
        run: |
          # Solo filtrar en ejecuciones programadas; manual siempre corre
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "abierto=true" >> "$GITHUB_OUTPUT"
            echo "Ejecución manual: se omite filtro de horario."
            exit 0
          fi

          # Hora Argentina con zoneinfo (UTC-3, sin DST)
          python3 << 'PYEOF'
          import sys
          from datetime import datetime
          from zoneinfo import ZoneInfo

          tz = ZoneInfo("America/Argentina/Buenos_Aires")
          ahora = datetime.now(tz)

          # 0 = lunes … 4 = viernes
          if ahora.weekday() > 4:
              print("Mercado cerrado: fin de semana.")
              sys.exit(0)

          minutos = ahora.hour * 60 + ahora.minute
          apertura = 11 * 60          # 11:00
          cierre = 17 * 60 + 30       # 17:30

          if apertura <= minutos <= cierre:
              print(f"Dentro de horario de mercado: {ahora.strftime('%H:%M')} ART")
              open("abierto.txt", "w").write("true")
          else:
              print(f"Fuera de horario de mercado: {ahora.strftime('%H:%M')} ART")
          PYEOF

          if [ -f abierto.txt ]; then
            echo "abierto=true" >> "$GITHUB_OUTPUT"
          else
            echo "abierto=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout del repositorio
        if: steps.mercado.outputs.abierto == 'true'
        uses: actions/checkout@v4

      - name: Configurar Python
        if: steps.mercado.outputs.abierto == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Instalar dependencias
        if: steps.mercado.outputs.abierto == 'true'
        run: pip install -r requirements.txt

      - name: Sincronizar con main antes del fetch
        if: steps.mercado.outputs.abierto == 'true'
        run: git pull --rebase origin main

      - name: Ejecutar script de cotizaciones
        if: steps.mercado.outputs.abierto == 'true'
        run: python scripts/fetch_cotizaciones.py

      - name: Configurar Node.js (tests pre-merge)
        if: steps.mercado.outputs.abierto == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Commit y publicar vía PR si hubo cambios
        if: steps.mercado.outputs.abierto == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Archivos que puede tocar fetch_cotizaciones.py (+ histórico incremental + cache MEP).
          DATA_FILES=(
            docs/data/cotizaciones.json
            docs/data/historico_precios.json
            docs/data/mep_historico.json
          )

          if git diff --quiet HEAD -- "${DATA_FILES[@]}"; then
            echo "Sin cambios en datos del fetch (idénticos a HEAD)"
            exit 0
          fi

          BRANCH="bot/cotizaciones-$(date -u +%Y%m%dT%H%M%SZ)"
          git checkout -b "$BRANCH"
          git add "${DATA_FILES[@]}"
          git commit -m "Actualizar cotizaciones BYMA [skip ci]"
          HEAD_SHA="$(git rev-parse HEAD)"

          # PRs creados con GITHUB_TOKEN no disparan workflow Tests; publicamos check "test" acá.
          if node scripts/run_tests.mjs; then
            TEST_CONCLUSION=success
          else
            TEST_CONCLUSION=failure
          fi
          gh api repos/${{ github.repository }}/check-runs \
            -f name=test \
            -f head_sha="$HEAD_SHA" \
            -f status=completed \
            -f conclusion="$TEST_CONCLUSION"
          if [ "$TEST_CONCLUSION" != success ]; then
            echo "Tests fallaron; abortando publicación."
            exit 1
          fi

          git push -u origin "$BRANCH"

          PR_URL="$(gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "Actualizar cotizaciones BYMA" \
            --body "Actualización automática de datos del panel (BYMA).")"
          echo "PR creado: $PR_URL"

          PR_NUMBER="$(gh pr view "$PR_URL" --json number --jq .number)"
          sleep 10
          gh pr merge "$PR_NUMBER" --merge --delete-branch
          echo "Datos publicados en main vía PR #${PR_NUMBER}."
